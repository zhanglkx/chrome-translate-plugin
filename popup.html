<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ARI 划词翻译</title>
    <style>
        body {
            width: 300px;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f9f9f9;
        }
        .popup-header {
            background: #4a90e2;
            color: white;
            padding: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }
        .popup-content {
            padding: 16px;
        }
        .setting-group {
            margin-bottom: 16px;
        }
        .setting-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }
        .setting-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .setting-checkbox {
            margin-right: 8px;
        }
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary {
            background: #4a90e2;
            color: white;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .status {
            margin-top: 12px;
            padding: 8px;
            background: #e8f4fd;
            border-radius: 4px;
            font-size: 12px;
            color: #666;
        }
        .api-key-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="popup-header">
        ARI 划词翻译
    </div>
    <div class="popup-content">
        <div class="setting-group">
            <label class="setting-label">API Key</label>
            <input type="password" class="api-key-input" id="apiKey" placeholder="输入您的DeepSeek API Key">
        </div>
        
        <div class="setting-group">
            <label class="setting-label">
                <input type="checkbox" class="setting-checkbox" id="enableCache" checked>
                启用缓存
            </label>
            <label class="setting-label">
                <input type="checkbox" class="setting-checkbox" id="enableDictionary" checked>
                启用本地词典
            </label>
        </div>
        
        <div class="status" id="status">
            状态：就绪
        </div>
        
        <div class="button-group">
            <button class="btn btn-primary" id="saveBtn">保存设置</button>
            <button class="btn btn-secondary" id="testBtn">测试翻译</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
